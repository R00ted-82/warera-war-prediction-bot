name: War preparation alert

on:
  schedule:
    #- cron: '0 */3 * * *'   # every 3 hours (event monitoring)
    # Daily posture report fires at 8pm Ireland local, year-round. The code
    # gates on Dublin local time; these two runs cover both offsets —
    # 19:00 UTC = 8pm IST (summer), 20:00 UTC = 8pm GMT (winter).
    #- cron: '0 19 * * *'
    #- cron: '0 20 * * *'
  workflow_dispatch:

# Prevents two runs from racing on war_state.json if a scheduled run
# overlaps with a manual one. The second run waits for the first.
concurrency:
  group: war-alert
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python war_alert.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.WAR_DISCORD_WEBHOOK_URL }}
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add war_state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update war_state.json"
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          git push