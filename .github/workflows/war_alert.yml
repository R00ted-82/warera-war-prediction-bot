name: War preparation alert

on:
  schedule:
    # Every 6 hours at :00. UTC. Picks up mobilisations within hours
    # rather than a day late. The bot has per-country cooldowns so
    # urgent alerts won't re-spam — see URGENT_COOLDOWN_DAYS in war_alert.py.
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Prevents two runs from racing on war_state.json if a scheduled run
# overlaps with a manual one. The second run waits for the first.
concurrency:
  group: war-alert
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python war_alert.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.WAR_DISCORD_WEBHOOK_URL }}
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add war_state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update war_state.json"
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          git push